<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
position:relative;
overflow:hidden;
}

.header img{
width:100%;
height:150px;
object-fit:cover;
}

.header h1{
position:absolute;
top:20px;
left:20px;
color:white;
}

.header h2{
position:absolute;
top:20px;
right:20px;
color:white;
}

.header::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:light 3s infinite;
}

@keyframes light{
0%{left:-100%;}
100%{left:100%;}
}

.box{
text-align:center;
margin-top:80px;
}

button{
width:220px;
padding:12px;
margin:10px;
font-size:16px;
background:#002147;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
<img src="header.jpg">
<h1>BNMU UNIVERSITY</h1>
<h2>BCA</h2>
</div>

<div class="box">
<button onclick="location.href='View.html'">Admit Card</button>
<button onclick="location.href='Marseet.html'">Marksheet</button>
<button onclick="alert('BNMU Information Page')">BNMU Information</button>
</div>

</body>
</html>
