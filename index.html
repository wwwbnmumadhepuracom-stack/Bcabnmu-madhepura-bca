<!DOCTYPE html>
<html>
<head>
<title>BNMU Login</title>
<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#002147,#004080);
color:white;
}

/* HEADER */
.header{
position:relative;
text-align:center;
overflow:hidden;
}

.header img{
width:100%;
height:150px;
object-fit:cover;
}

.header h1{
position:absolute;
top:20px;
left:20px;
}

.header h2{
position:absolute;
top:20px;
right:20px;
}

/* Moving Light Effect */
.header::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
animation:light 3s infinite;
}

@keyframes light{
0%{left:-100%;}
100%{left:100%;}
}

/* Login Box */
.box{
width:320px;
margin:50px auto;
background:white;
color:black;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px cyan;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#002147;
color:white;
border:none;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<img src="header.jpg">
<h1>BNMU UNIVERSITY</h1>
<h2>BCA</h2>
</div>

<div class="box">
<h3 align="center">Student Login</h3>
<input type="text" id="num" placeholder="Mobile Number">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<a href="Registration.html">New Registration</a>
</div>

<script>
function login(){
var n=document.getElementById("num").value;
var p=document.getElementById("pass").value;

if(n=="7280804309" && p=="shivam@@"){
window.location="dashboard.html";
}else{
alert("Wrong Details");
}
}
</script>

</body>
</html>
