<!DOCTYPE html>
<html>
<head>
<title>BNMU University Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#001f3f,#003366);
color:white;
}

/* HEADER */
.header{
position:relative;
height:160px;
overflow:hidden;
}

.header img{
width:100%;
height:160px;
object-fit:cover;
}

.header h1{
position:absolute;
top:30px;
left:30px;
}

.header h2{
position:absolute;
top:30px;
right:30px;
}

/* Moving light */
.header::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
animation:light 4s infinite;
}

@keyframes light{
0%{left:-100%;}
100%{left:100%;}
}

/* HOME BUTTON */
.home-btn{
position:absolute;
top:110px;
left:30px;
background:#ffcc00;
color:black;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.home-btn:hover{
background:white;
}

/* LOGIN BOX */
.container{
display:flex;
justify-content:center;
margin-top:40px;
}

.login-box{
width:350px;
background:white;
color:black;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px cyan;
}

.login-box h3{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#002147;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#004080;
}

.register{
text-align:center;
margin-top:10px;
}

/* IMAGE SECTION */
.image-section{
text-align:center;
margin-top:40px;
}

.image-section img{
width:80%;
max-width:600px;
border-radius:10px;
box-shadow:0 0 15px black;
}

/* ABOUT SECTION */
.about{
padding:40px;
text-align:center;
}

.about h2{
margin-bottom:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="header.jpg">
<h1>BNMU UNIVERSITY</h1>
<h2>BCA</h2>
<div class="home-btn" onclick="goHome()">🏠 Home</div>
</div>

<!-- LOGIN -->
<div class="container">
<div class="login-box">
<h3>University Student Login</h3>

<input type="text" id="num" placeholder="Mobile Number">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<div class="register">
<a href="Registration.html">New Registration</a>
</div>

</div>
</div>

<!-- IMAGE -->
<div class="image-section">
<img src="ssk.jpg">
</div>

<!-- ABOUT -->
<div class="about">
<h2>About University</h2>
<p>Bhupendra Narayan Mandal University (BNMU) provides quality education and excellence in academic performance.</p>
</div>

<script>

function login(){
var n=document.getElementById("num").value;
var p=document.getElementById("pass").value;

if(n=="7280804309" && p=="shivam@@"){
window.location="dashboard.html";
}else{
alert("Invalid Login Details");
}
}

function goHome(){
window.location="index.html";
}

</script>

</body>
</html>
