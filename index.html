<!DOCTYPE html>
<html>
<head>
<title>BNMU University Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#001f3f,#003366,#002147);
overflow:hidden;
height:100vh;
}

/* Floating Particles */
.particle{
position:absolute;
font-size:22px;
animation:float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh) rotate(0deg);}
100%{transform:translateY(-10vh) rotate(360deg);}
}

/* HEADER */
.header{
position:absolute;
top:0;
width:100%;
height:160px;
overflow:hidden;
}

.header img{
width:100%;
height:160px;
object-fit:cover;
}

.header h1{
position:absolute;
top:30px;
left:30px;
color:white;
letter-spacing:2px;
}

.header h2{
position:absolute;
top:30px;
right:30px;
color:white;
}

/* Moving light effect */
.header::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
animation:lightMove 4s infinite;
}

@keyframes lightMove{
0%{left:-100%;}
100%{left:100%;}
}

/* CENTER LOGIN BOX */
.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:350px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border:2px solid transparent;
background-clip:padding-box;
position:relative;
transform-style:preserve-3d;
transition:0.5s;
box-shadow:0 0 25px rgba(0,255,255,0.6);
}

/* RGB Border Animation */
.login-box::before{
content:"";
position:absolute;
top:-3px;
left:-3px;
right:-3px;
bottom:-3px;
border-radius:22px;
background:linear-gradient(45deg,red,blue,green,yellow,red);
background-size:400%;
z-index:-1;
animation:rgbBorder 6s linear infinite;
}

@keyframes rgbBorder{
0%{background-position:0%;}
100%{background-position:400%;}
}

.login-box:hover{
transform:rotateY(8deg) rotateX(8deg);
}

.login-box h3{
text-align:center;
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#002147;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0059b3;
}

.register{
text-align:center;
margin-top:15px;
}

.register a{
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<!-- Floating Books & Pens -->
<div class="particle" style="left:10%;animation-duration:12s;">📘</div>
<div class="particle" style="left:25%;animation-duration:9s;">✏</div>
<div class="particle" style="left:40%;animation-duration:14s;">📚</div>
<div class="particle" style="left:55%;animation-duration:11s;">🖊</div>
<div class="particle" style="left:70%;animation-duration:13s;">📖</div>
<div class="particle" style="left:85%;animation-duration:10s;">✏</div>

<!-- HEADER -->
<div class="header">
<img src="header.jpg">
<h1>BNMU UNIVERSITY</h1>
<h2>BCA</h2>
</div>

<!-- LOGIN -->
<div class="container">
<div class="login-box">
<h3>University Student Login</h3>

<input type="text" id="num" placeholder="Mobile Number">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<div class="register">
<a href="Registration.html">New Registration</a>
</div>

</div>
</div>

<script>
function login(){
var n=document.getElementById("num").value;
var p=document.getElementById("pass").value;

if(n=="7280804309" && p=="shivam@@"){
window.location="dashboard.html";
}else{
alert("Invalid Login Details");
}
}
</script>

</body>
</html>
