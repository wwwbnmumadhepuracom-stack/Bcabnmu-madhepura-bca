<!DOCTYPE html>
<html>
<head>
<title>BNMU University - Login</title>
<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.header{
position:absolute;
top:0;
width:100%;
background:#001233;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}
.right{
position:absolute;
right:20px;
top:15px;
color:yellow;
}
.box{
background:white;
color:black;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
animation:slide 1s ease;
}
@keyframes slide{
from{transform:translateY(40px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}
input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}
button{
width:100%;
padding:10px;
background:#002147;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
button:hover{
background:#004aad;
}
a{
display:block;
margin-top:10px;
text-align:center;
}
</style>
</head>
<body>

<div class="header">
BNMU UNIVERSITY
<div class="right">BCA</div>
</div>

<div class="box">
<h2>Student Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<a href="Registration.html">New Registration?</a>
</div>

<script>
function login(){
var u=document.getElementById("user").value;
var p=document.getElementById("pass").value;

if(u==="shivam186" && p==="shivam@@"){
window.location="dashboard.html";
}else{
alert("Invalid Login Details");
}
}
</script>

</body>
</html>
